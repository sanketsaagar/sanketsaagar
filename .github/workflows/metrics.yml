name: Generate Metrics

on:
  # Refresh once a day
  schedule:
    - cron: "0 0 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate when this workflow changes
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Render metrics SVG
        uses: lowlighter/metrics@latest
        with:
          # Personal Access Token — classic PAT stored as repo secret METRICS_TOKEN.
          token: ${{ secrets.METRICS_TOKEN }}
          user: sanketsaagar
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata
          config_animations: yes
          config_padding: 6%

          # ---- Short intro line under the header ----
          plugin_introduction: yes
          plugin_introduction_title: no

          # ---- Isometric 3D contribution calendar (full year) ----
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # ---- In-depth language breakdown (most-used + recently-used) ----
          plugin_languages: yes
          plugin_languages_indepth: yes
          plugin_languages_analyzer_duration: 15
          plugin_languages_sections: most-used
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_colors: github

          # ---- Tech topics rendered as icons ----
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 12
          plugin_topics_sort: stars

          # ---- Notable contributions to organizations (e.g. Polygon) ----
          plugin_notable: yes
          plugin_notable_from: organization
          plugin_notable_types: commit

          # ---- GitHub achievements (detailed) ----
          plugin_achievements: yes
          plugin_achievements_threshold: C
          plugin_achievements_secrets: yes
          plugin_achievements_display: detailed
          plugin_achievements_limit: 0
