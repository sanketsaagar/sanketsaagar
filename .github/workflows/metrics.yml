name: Generate Metrics

on:
  # Refresh once a day
  schedule:
    - cron: "0 0 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate when this workflow changes
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  metrics:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Render metrics SVG
        uses: lowlighter/metrics@latest
        with:
          # Personal Access Token — create a classic PAT and add it as the
          # repository secret METRICS_TOKEN (see README setup notes).
          token: ${{ secrets.METRICS_TOKEN }}
          user: sanketsaagar
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Asia/Kolkata

          # Most-used languages
          plugin_languages: yes
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8

          # Isometric contribution calendar (full year)
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # Coding habits & activity facts
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # GitHub achievements
          plugin_achievements: yes
          plugin_achievements_threshold: C
